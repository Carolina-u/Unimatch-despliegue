<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unimatch - Detalle de Universidad</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .uni-detail-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        /* Botón volver */
        .btn-volver {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }
        
        .btn-volver:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* Header de la universidad */
        .uni-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 24px;
            padding: 2.5rem;
            color: white;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .uni-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .uni-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .uni-header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 80%;
            line-height: 1.5;
        }
        
        /* Grid de información */
        .uni-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .info-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .info-card i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        .info-card h3 {
            color: #333;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }
        
        .info-card p {
            color: #666;
            line-height: 1.5;
        }
        
        .info-card a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }
        
        .info-card a:hover {
            text-decoration: underline;
        }
        
        /* Sección de carreras */
        .carreras-section {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .carreras-section h2 {
            color: #333;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            border-left: 4px solid #667eea;
            padding-left: 1rem;
        }
        
        .carreras-section h2 i {
            color: #667eea;
        }
        
        /* Grid de carreras */
        .carreras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .carrera-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        
        .carrera-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        
        .carrera-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .carrera-card:hover::before {
            width: 6px;
        }
        
        .carrera-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .carrera-header h4 {
            font-size: 1.1rem;
            color: #1e293b;
            font-weight: 600;
        }
        
        .carrera-area {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            display: inline-block;
        }
        
        .carrera-descripcion {
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-top: 0.5rem;
        }
        
        .carrera-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .carrera-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .carrera-icon i {
            font-size: 0.7rem;
            color: #667eea;
        }
        
        /* Botón para ver pensum PDF */
        .btn-pensum {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }
        
        .btn-pensum:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-pensum i {
            font-size: 0.7rem;
        }
        
        /* Contador de carreras */
        .carreras-count-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 30px;
            padding: 0.2rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 24px;
        }
        
        .loading i {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            color: #f87171;
        }
        
        .error-message i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }
        
        .status.active {
            background: rgba(59, 191, 139, 0.15);
            color: #10b981;
            border: 1px solid rgba(59, 191, 139, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .uni-detail-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            
            .uni-header h1 {
                font-size: 1.8rem;
            }
            
            .uni-header p {
                max-width: 100%;
            }
            
            .carreras-grid {
                grid-template-columns: 1fr;
            }
            
            .uni-info-grid {
                grid-template-columns: 1fr;
            }
            
            .carrera-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .carrera-area {
                align-self: flex-start;
            }
            
            .carrera-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="uni-detail-container">
        <button class="btn-volver" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </button>
        
        <div id="uni-content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando información de la universidad...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API = "https://unimatch-backend-um2f.onrender.com/api";
        let universidad = null;
        let carrerasUniversidad = [];
        
        // Mapa de íconos por área
        const iconosPorArea = {
            'Ingeniería': 'fa-microchip',
            'Tecnología': 'fa-laptop-code',
            'Salud': 'fa-heartbeat',
            'Medicina': 'fa-stethoscope',
            'Sociales': 'fa-users',
            'Humanidades': 'fa-book-open',
            'Administración': 'fa-chart-line',
            'Negocios': 'fa-briefcase',
            'Arte': 'fa-palette',
            'Diseño': 'fa-pen-fancy',
            'Educación': 'fa-chalkboard-user',
            'Derecho': 'fa-gavel',
            'Ciencias': 'fa-flask',
            'Comunicación': 'fa-newspaper',
            'Arquitectura': 'fa-draw-polygon',
            'Deporte': 'fa-futbol',
            'Ambiente': 'fa-leaf',
            'default': 'fa-graduation-cap'
        };
        
        function getIconoArea(areaNombre) {
            for (const [key, icono] of Object.entries(iconosPorArea)) {
                if (areaNombre && areaNombre.toLowerCase().includes(key.toLowerCase())) {
                    return icono;
                }
            }
            return iconosPorArea.default;
        }
        
        function getUniversidadId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        async function cargarUniversidad() {
            const id = getUniversidadId();
            
            if (!id) {
                mostrarError('No se especificó ninguna universidad');
                return;
            }
            
            try {
                const [unisRes, carrerasRes] = await Promise.all([
                    fetch(`${API}/universidades`),
                    fetch(`${API}/carreras`)
                ]);
                
                const universidades = await unisRes.json();
                const todasCarreras = await carrerasRes.json();
                
                universidad = universidades.find(u => u.id_universidad === parseInt(id));
                
                if (!universidad) {
                    mostrarError('Universidad no encontrada');
                    return;
                }
                
                carrerasUniversidad = todasCarreras.filter(c => c.id_universidad === parseInt(id));
                renderizarUniversidad();
                
            } catch (error) {
                console.error('Error cargando universidad:', error);
                mostrarError('Error al cargar la información de la universidad');
            }
        }
        
        function verPensum(urlPensum) {
            if (urlPensum) {
                window.open(urlPensum, '_blank');
            }
        }
        
        function renderizarUniversidad() {
            const container = document.getElementById('uni-content');
            
            container.innerHTML = `
                <div class="uni-header" style="display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;">
                    <div style="flex: 1;">
                        <h1><i class="fas fa-university"></i> ${escapeHtml(universidad.nombre)}</h1>
                        <p>${escapeHtml(universidad.descripcion || 'Institución de educación superior comprometida con la excelencia académica y la formación integral de profesionales.')}</p>
                    </div>
                    <div style="flex-shrink: 0;">
                        <img src="https://ui-avatars.com/api/?background=667eea&color=fff&bold=true&size=100&name=${escapeHtml(universidad.nombre.split(' ')[0])}" 
                             style="border-radius: 20px; width: 100px; height: 100px; object-fit: cover;">
                    </div>
                </div>
                
                <div class="uni-info-grid">
                    <div class="info-card">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>📍 Ubicación</h3>
                        <p><strong>Ciudad:</strong> ${escapeHtml(universidad.ciudad)}</p>
                        <p><strong>Departamento:</strong> ${escapeHtml(universidad.departamento)}</p>
                    </div>
                    
                    <div class="info-card">
                        <i class="fas fa-globe"></i>
                        <h3>🌐 Sitio Web</h3>
                        <p>${universidad.sitio_web ? `<a href="${universidad.sitio_web}" target="_blank">${universidad.sitio_web}</a>` : 'No disponible'}</p>
                    </div>
                    
                    <div class="info-card">
                        <i class="fas fa-book"></i>
                        <h3>📚 Oferta Académica</h3>
                        <p><strong>${carrerasUniversidad.length}</strong> carreras disponibles</p>
                    </div>
                    
                    <div class="info-card">
                        <i class="fas fa-chart-line"></i>
                        <h3>📊 Estado</h3>
                        <p><span class="status active">● Activa</span></p>
                    </div>
                </div>
                
                <div class="carreras-section">
                    <h2>
                        <i class="fas fa-graduation-cap"></i> 
                        Carreras ofrecidas 
                        <span class="carreras-count-badge">${carrerasUniversidad.length}</span>
                    </h2>
                    
                    ${carrerasUniversidad.length === 0 ? 
                        '<p style="text-align: center; color: #666; padding: 2rem;">No hay carreras registradas para esta universidad</p>' :
                        `<div class="carreras-grid">
                            ${carrerasUniversidad.map(c => {
                                const icono = getIconoArea(c.area_nombre);
                                return `
                                    <div class="carrera-card">
                                        <div class="carrera-header">
                                            <h4><i class="fas ${icono}" style="color: #667eea; margin-right: 0.5rem;"></i>${escapeHtml(c.nombre)}</h4>
                                            <span class="carrera-area">${escapeHtml(c.area_nombre)}</span>
                                        </div>
                                        <div class="carrera-descripcion">
                                            ${escapeHtml(c.descripcion ? c.descripcion.substring(0, 120) : 'Sin descripción disponible')}${c.descripcion && c.descripcion.length > 120 ? '...' : ''}
                                        </div>
                                        <div class="carrera-footer">
                                            <div class="carrera-icon">
                                                <i class="fas fa-clock"></i> Duración: Pregrado
                                            </div>
                                            ${c.url_pensum ? `
                                                <button class="btn-pensum" onclick="verPensum('${c.url_pensum}')">
                                                    <i class="fas fa-file-pdf"></i> Ver plan de estudios (PDF)
                                                </button>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>`
                    }
                </div>
            `;
        }
        
        function mostrarError(mensaje) {
            const container = document.getElementById('uni-content');
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>${mensaje}</p>
                    <button class="btn-volver" onclick="window.location.href='index.html'" style="margin-top: 1rem;">
                        <i class="fas fa-home"></i> Volver al inicio
                    </button>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        cargarUniversidad();
    </script>
</body>
</html>
